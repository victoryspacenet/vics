# 빌드 시 환경 변수: Netlify → Project configuration → Environment variables
# (저장소의 .env.local 은 Netlify가 읽지 않음)
# 로컬 `npm run dev`는 `.env.local` + `.env.development` — Supabase는
# `VITE_SUPABASE_URL` / `VITE_SUPABASE_ANON_KEY` 이름을 Netlify와 동일하게 맞추세요.
# docs/DEPLOYMENT_ENV.md 참고
[build]
  command = "npm run build"
  publish = "dist"

# 로컬 `npm run dev:netlify` — 브라우저는 http://localhost:8888
# (Vite만 쓸 때는 `npm run dev` → http://localhost:5173)
# targetPort: Netlify가 붙을 Vite 포트. Vite를 따로 띄우지 말고 netlify dev 한 번만 실행하는 것을 권장.
[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  publish = "dist"

